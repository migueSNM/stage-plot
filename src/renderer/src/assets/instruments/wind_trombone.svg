<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Trombone: U-shaped slide + bell flare -->
  <!-- Outer slide tube (left) -->
  <rect x="6" y="34" width="8" height="40" rx="3"/>
  <!-- Bottom crossbar -->
  <rect x="6" y="70" width="30" height="8" rx="3"/>
  <!-- Inner slide (right of U) -->
  <rect x="28" y="34" width="8" height="44" rx="3"/>
  <!-- Top crossbar connecting to bell section -->
  <rect x="6" y="34" width="50" height="8" rx="3"/>
  <!-- Bell section tube -->
  <rect x="48" y="34" width="8" height="30" rx="3"/>
  <!-- Bell flare -->
  <path d="M 56 46 C 66 44 78 42 86 38 C 90 36 92 40 92 44 C 92 48 90 52 86 52 C 78 52 66 52 56 56 Z"/>
</svg>
