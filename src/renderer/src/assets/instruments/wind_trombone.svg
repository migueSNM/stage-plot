  <rect x="8" y="36" width="8" height="36" rx="3"/>
  <!-- Inner slide tubes -->
  <rect x="20" y="36" width="6" height="36" rx="3"/>
  <!-- Top crossbar -->
  <rect x="8" y="36" width="18" height="6" rx="3"/>
  <!-- Bottom crossbar -->
  <rect x="8" y="66" width="18" height="6" rx="3"/>
  <!-- Main body tube -->
  <rect x="26" y="38" width="46" height="10" rx="4"/>
  <!-- Bell flare -->
  <path d="M 72 40 C 82 38 90 36 94 34 C 96 38 96 44 94 48 C 90 52 82 52 72 50 Z"/>
