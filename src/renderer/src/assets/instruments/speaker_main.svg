<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- PA speaker cabinet: tall rectangle with driver + tweeter -->
  <rect x="8" y="4" width="80" height="88" rx="4"/>
  <!-- Main woofer cone -->
  <circle fill="#1a1a1a" cx="48" cy="58" r="26"/>
  <circle cx="48" cy="58" r="16"/>
  <circle fill="#1a1a1a" cx="48" cy="58" r="8"/>
  <circle cx="48" cy="58" r="4"/>
  <!-- Tweeter (smaller, above) -->
  <circle fill="#1a1a1a" cx="48" cy="22" r="10"/>
  <circle cx="48" cy="22" r="6"/>
  <circle fill="#1a1a1a" cx="48" cy="22" r="3"/>
</svg>
