  <rect fill="#1a1a1a" x="44" y="20" width="4" height="40" rx="1"/>
  <rect fill="#1a1a1a" x="52" y="20" width="4" height="40" rx="1"/>
  <rect fill="#1a1a1a" x="60" y="20" width="4" height="40" rx="1"/>
  <rect fill="#1a1a1a" x="68" y="20" width="4" height="40" rx="1"/>
