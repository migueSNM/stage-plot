<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Handheld microphone: round capsule + handle -->
  <!-- Capsule head -->
  <rect x="32" y="6" width="32" height="36" rx="16"/>
  <!-- Grill detail lines -->
  <rect fill="#1a1a1a" x="34" y="16" width="28" height="2" rx="1"/>
  <rect fill="#1a1a1a" x="34" y="22" width="28" height="2" rx="1"/>
  <rect fill="#1a1a1a" x="34" y="28" width="28" height="2" rx="1"/>
  <!-- Band between capsule and handle -->
  <rect x="34" y="42" width="28" height="6" rx="2"/>
  <!-- Handle -->
  <rect x="38" y="48" width="20" height="42" rx="6"/>
</svg>
