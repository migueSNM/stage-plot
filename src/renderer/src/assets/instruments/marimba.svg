<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Marimba: graduated bars + resonator tubes, single color -->
  <!-- Horizontal frame rails -->
  <rect x="4" y="28" width="88" height="6" rx="2"/>
  <!-- Keys (graduated height bars) -->
  <rect x="8" y="8" width="10" height="24" rx="1"/>
  <rect x="22" y="6" width="10" height="26" rx="1"/>
  <rect x="36" y="4" width="10" height="28" rx="1"/>
  <rect x="50" y="4" width="10" height="28" rx="1"/>
  <rect x="64" y="6" width="10" height="26" rx="1"/>
  <rect x="78" y="8" width="10" height="24" rx="1"/>
  <!-- Resonator tubes below frame -->
  <rect x="10" y="34" width="6" height="28" rx="3"/>
  <rect x="24" y="34" width="6" height="34" rx="3"/>
  <rect x="38" y="34" width="6" height="40" rx="3"/>
  <rect x="52" y="34" width="6" height="40" rx="3"/>
  <rect x="66" y="34" width="6" height="34" rx="3"/>
  <rect x="80" y="34" width="6" height="28" rx="3"/>
  <!-- Legs -->
  <rect x="8" y="74" width="6" height="20" rx="2"/>
  <rect x="82" y="74" width="6" height="20" rx="2"/>
</svg>
