<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Marimba: bars on frame with resonator tubes -->
  <!-- Frame -->
  <rect x="4" y="30" width="88" height="8" rx="2"/>
  <!-- Keys (bars, graduated lengths) -->
  <rect x="8" y="10" width="10" height="28" rx="1"/>
  <rect x="22" y="8" width="10" height="30" rx="1"/>
  <rect x="36" y="6" width="10" height="32" rx="1"/>
  <rect x="50" y="6" width="10" height="32" rx="1"/>
  <rect x="64" y="8" width="10" height="30" rx="1"/>
  <rect x="78" y="10" width="10" height="28" rx="1"/>
  <!-- Resonator tubes -->
  <rect x="10" y="38" width="6" height="30" rx="3"/>
  <rect x="24" y="38" width="6" height="36" rx="3"/>
  <rect x="38" y="38" width="6" height="42" rx="3"/>
  <rect x="52" y="38" width="6" height="42" rx="3"/>
  <rect x="66" y="38" width="6" height="36" rx="3"/>
  <rect x="80" y="38" width="6" height="30" rx="3"/>
  <!-- Legs -->
  <rect x="10" y="80" width="6" height="16" rx="2"/>
  <rect x="80" y="80" width="6" height="16" rx="2"/>
</svg>
