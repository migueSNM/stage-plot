<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Stage keyboard/synth: slim rectangle with keys -->
  <rect x="4" y="22" width="88" height="52" rx="4"/>
  <!-- White key separators (dark lines at bottom of white keys) -->
  <rect fill="#1a1a1a" x="4" y="56" width="88" height="18" rx="3"/>
  <!-- Black keys on top of keyboard area -->
  <rect fill="white" x="4" y="56" width="88" height="18" rx="3"/>
  <!-- Key lines (white key divisions) -->
  <rect fill="#1a1a1a" x="17" y="56" width="2" height="18"/>
  <rect fill="#1a1a1a" x="30" y="56" width="2" height="18"/>
  <rect fill="#1a1a1a" x="43" y="56" width="2" height="18"/>
  <rect fill="#1a1a1a" x="56" y="56" width="2" height="18"/>
  <rect fill="#1a1a1a" x="69" y="56" width="2" height="18"/>
  <rect fill="#1a1a1a" x="82" y="56" width="2" height="18"/>
  <!-- Black keys -->
  <rect fill="#1a1a1a" x="10" y="56" width="8" height="12" rx="1"/>
  <rect fill="#1a1a1a" x="23" y="56" width="8" height="12" rx="1"/>
  <rect fill="#1a1a1a" x="36" y="56" width="8" height="12" rx="1"/>
  <rect fill="#1a1a1a" x="49" y="56" width="8" height="12" rx="1"/>
  <rect fill="#1a1a1a" x="62" y="56" width="8" height="12" rx="1"/>
  <rect fill="#1a1a1a" x="75" y="56" width="8" height="12" rx="1"/>
  <!-- Control knobs on top panel -->
  <circle fill="#1a1a1a" cx="24" cy="38" r="5"/>
  <circle fill="#1a1a1a" cx="40" cy="38" r="5"/>
  <circle fill="#1a1a1a" cx="56" cy="38" r="5"/>
  <circle fill="#1a1a1a" cx="72" cy="38" r="5"/>
</svg>
