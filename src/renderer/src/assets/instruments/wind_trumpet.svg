<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Trumpet: horizontal side view, valve cluster + bell flare (matches reference) -->
  <!-- Leadpipe / mouthpiece receiver -->
  <rect x="4" y="40" width="16" height="10" rx="4"/>
  <!-- Main tube body -->
  <rect x="18" y="42" width="44" height="8" rx="3"/>
  <!-- Three valve casings -->
  <rect x="36" y="26" width="10" height="24" rx="4"/>
  <rect x="50" y="26" width="10" height="24" rx="4"/>
  <rect x="64" y="26" width="10" height="24" rx="4"/>
  <!-- Valve tops -->
  <rect x="38" y="24" width="6" height="4" rx="2"/>
  <rect x="52" y="24" width="6" height="4" rx="2"/>
  <rect x="66" y="24" width="6" height="4" rx="2"/>
  <!-- Bell flare (widening to the right) -->
  <path d="M 74 44 C 82 42 90 40 94 36 C 96 34 96 40 96 44 C 96 48 96 54 94 52 C 90 48 82 50 74 50 Z"/>
  <!-- Return loop at left (U-bend) -->
  <rect x="4" y="50" width="18" height="8" rx="4"/>
  <rect x="16" y="50" width="8" height="20" rx="3"/>
  <rect x="16" y="66" width="28" height="8" rx="3"/>
</svg>
