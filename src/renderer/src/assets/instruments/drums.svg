<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Drum kit: front perspective view matching reference (kick circle + toms on stands) -->
  <!-- Kick drum (large circle, front-center) with hole -->
  <path fill-rule="evenodd" d="
    M48 88 a26 26 0 1 0 0.01 0Z
    M48 88 m-16 0 a16 16 0 1 0 0.01 0Z
  "/>
  <!-- Left rack tom -->
  <path fill-rule="evenodd" d="
    M20 40 a14 14 0 1 0 0.01 0Z
    M20 40 m-8 0 a8 8 0 1 0 0.01 0Z
  "/>
  <!-- Right rack tom -->
  <path fill-rule="evenodd" d="
    M52 34 a14 14 0 1 0 0.01 0Z
    M52 34 m-8 0 a8 8 0 1 0 0.01 0Z
  "/>
  <!-- Floor tom (right side) -->
  <path fill-rule="evenodd" d="
    M78 66 a14 14 0 1 0 0.01 0Z
    M78 66 m-8 0 a8 8 0 1 0 0.01 0Z
  "/>
  <!-- Snare (front left) -->
  <path fill-rule="evenodd" d="
    M14 68 a10 10 0 1 0 0.01 0Z
    M14 68 m-6 0 a6 6 0 1 0 0.01 0Z
  "/>
  <!-- Cymbal (thin oval, upper area) -->
  <ellipse cx="76" cy="20" rx="14" ry="5"/>
  <!-- Hi-hat (two overlapping ovals) -->
  <ellipse cx="10" cy="26" rx="10" ry="4"/>
  <ellipse cx="10" cy="32" rx="10" ry="4"/>
  <!-- Tom stands (thin lines) -->
  <rect x="18" y="54" width="4" height="20" rx="2"/>
  <rect x="50" y="48" width="4" height="14" rx="2"/>
</svg>
