<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Full drum kit: front perspective view -->
  <!-- Kick drum (large circle, center) -->
  <circle cx="48" cy="68" r="24"/>
  <circle fill="#1a1a1a" cx="48" cy="68" r="17"/>
  <circle cx="48" cy="68" r="8"/>
  <!-- Left rack tom (smaller, upper-left) -->
  <circle cx="26" cy="36" r="13"/>
  <circle fill="#1a1a1a" cx="26" cy="36" r="8"/>
  <!-- Right rack tom (upper-right) -->
  <circle cx="55" cy="32" r="13"/>
  <circle fill="#1a1a1a" cx="55" cy="32" r="8"/>
  <!-- Snare (front-left, smaller) -->
  <circle cx="14" cy="56" r="11"/>
  <circle fill="#1a1a1a" cx="14" cy="56" r="7"/>
  <!-- Hi-hat (flat circles, upper-left) -->
  <ellipse cx="8" cy="30" rx="10" ry="4"/>
  <ellipse cx="8" cy="26" rx="10" ry="4"/>
  <!-- Crash cymbal (upper-right, larger flat ellipse) -->
  <ellipse cx="80" cy="20" rx="14" ry="5"/>
  <!-- Stand legs -->
  <line x1="48" y1="92" x2="28" y2="96" stroke="white" stroke-width="3"/>
  <line x1="48" y1="92" x2="68" y2="96" stroke="white" stroke-width="3"/>
</svg>
