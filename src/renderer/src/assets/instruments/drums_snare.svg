<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Snare drum: short cylinder, slight perspective, single color -->
  <!-- Top head (ellipse) -->
  <ellipse cx="48" cy="28" rx="40" ry="12"/>
  <!-- Shell sides -->
  <rect x="8" y="28" width="80" height="28"/>
  <!-- Bottom hoop -->
  <ellipse cx="48" cy="56" rx="40" ry="12"/>
  <!-- Snare wires implied by thin horizontal shapes -->
  <rect x="14" y="68" width="68" height="3" rx="1"/>
  <rect x="14" y="73" width="68" height="3" rx="1"/>
</svg>
