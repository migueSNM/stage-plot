<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Organ: two keyboard manuals stacked -->
  <rect x="4" y="6" width="88" height="28" rx="3"/>
  <!-- Upper manual black keys -->
  <rect fill="#1a1a1a" x="14" y="6" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="25" y="6" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="40" y="6" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="51" y="6" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="62" y="6" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="76" y="6" width="6" height="16" rx="1"/>
  <!-- Second manual -->
  <rect x="4" y="38" width="88" height="28" rx="3"/>
  <rect fill="#1a1a1a" x="14" y="38" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="25" y="38" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="40" y="38" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="51" y="38" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="62" y="38" width="6" height="16" rx="1"/>
  <rect fill="#1a1a1a" x="76" y="38" width="6" height="16" rx="1"/>
  <!-- Pedal board -->
  <rect x="16" y="70" width="64" height="20" rx="4"/>
</svg>
