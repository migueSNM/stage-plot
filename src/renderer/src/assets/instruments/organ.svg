  <rect x="4" y="34" width="88" height="24" rx="3"/>
  <path fill-rule="evenodd" d="
    M 4 42 L 92 42 L 92 58 L 4 58 Z
    M 12 42 L 16 42 L 16 52 L 12 52 Z
