<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Electronic drum kit: 3x3 pad grid in frame -->
  <rect x="4" y="16" width="88" height="64" rx="4"/>
  <!-- 9 pads in 3x3 grid -->
  <rect fill="#1a1a1a" x="12" y="24" width="22" height="18" rx="8"/>
  <rect fill="#1a1a1a" x="38" y="24" width="20" height="18" rx="8"/>
  <rect fill="#1a1a1a" x="62" y="24" width="22" height="18" rx="8"/>
  <rect fill="#1a1a1a" x="12" y="46" width="22" height="18" rx="8"/>
  <rect fill="#1a1a1a" x="38" y="46" width="20" height="18" rx="8"/>
  <rect fill="#1a1a1a" x="62" y="46" width="22" height="18" rx="8"/>
  <!-- Hi-hat and kick pedals at bottom -->
  <rect x="14" y="82" width="18" height="10" rx="4"/>
  <rect x="64" y="82" width="18" height="10" rx="4"/>
</svg>
