  <!-- Black keys -->
  <rect fill="#1a1a1a" x="16" y="76" width="6" height="10" rx="1"/>
  <rect fill="#1a1a1a" x="26" y="76" width="6" height="10" rx="1"/>
  <rect fill="#1a1a1a" x="41" y="76" width="6" height="10" rx="1"/>
  <rect fill="#1a1a1a" x="51" y="76" width="6" height="10" rx="1"/>
  <rect fill="#1a1a1a" x="61" y="76" width="6" height="10" rx="1"/>
  <rect fill="#1a1a1a" x="76" y="76" width="6" height="10" rx="1"/>
  <!-- Panel detail (vents/grill lines) -->
  <rect fill="#1a1a1a" x="14" y="24" width="68" height="3" rx="1"/>
  <rect fill="#1a1a1a" x="14" y="31" width="68" height="3" rx="1"/>
  <rect fill="#1a1a1a" x="14" y="38" width="68" height="3" rx="1"/>
