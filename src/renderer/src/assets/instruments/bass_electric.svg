    <!-- Neck (longer than guitar) -->
    <rect x="42" y="12" width="10" height="32"/>
    <!-- Bass horn (single treble cutaway style) -->
    <path d="M52 44 C58 42 70 38 76 32 C82 26 80 18 74 18 C68 18 64 24 60 32 C58 36 55 40 52 44Z"/>
    <!-- Body -->
    <path d="M42 44 C28 46 16 56 16 68 C16 80 28 90 48 90 C66 90 80 80 80 68 C80 56 68 46 52 44Z"/>
  </g>
</svg>
