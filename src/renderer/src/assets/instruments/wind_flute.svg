<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Flute: long horizontal tube with tone holes -->
  <!-- Main tube -->
  <rect x="4" y="42" width="88" height="12" rx="6"/>
  <!-- Embouchure hole -->
  <circle fill="#1a1a1a" cx="16" cy="48" r="4"/>
  <!-- Tone holes (series of circles) -->
  <circle fill="#1a1a1a" cx="32" cy="48" r="3"/>
  <circle fill="#1a1a1a" cx="42" cy="48" r="3"/>
  <circle fill="#1a1a1a" cx="52" cy="48" r="3"/>
  <circle fill="#1a1a1a" cx="62" cy="48" r="3"/>
  <circle fill="#1a1a1a" cx="72" cy="48" r="3"/>
  <circle fill="#1a1a1a" cx="82" cy="48" r="3"/>
  <!-- Crown (end cap) -->
  <circle cx="6" cy="48" r="5"/>
</svg>
