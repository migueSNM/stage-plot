    <!-- Main tube -->
    <rect x="4" y="42" width="88" height="12" rx="6"/>
    <!-- Tone holes as evenodd cutouts -->
    <path fill-rule="evenodd" d="
      M 4 42 L 92 42 L 92 54 L 4 54 Z
      M 20 48 a 4 4 0 1 0 0.01 0Z
      M 32 48 a 3.5 3.5 0 1 0 0.01 0Z
      M 44 48 a 3.5 3.5 0 1 0 0.01 0Z
      M 56 48 a 3.5 3.5 0 1 0 0.01 0Z
      M 66 48 a 3.5 3.5 0 1 0 0.01 0Z
      M 76 48 a 3.5 3.5 0 1 0 0.01 0Z
    "/>
  </g>
</svg>
