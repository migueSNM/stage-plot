<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Combo amp: rectangular cabinet with speaker + controls -->
  <rect x="4" y="4" width="88" height="88" rx="4"/>
  <!-- Control panel strip at top -->
  <rect fill="#1a1a1a" x="6" y="6" width="84" height="20" rx="3"/>
  <!-- Knobs on panel -->
  <circle cx="24" cy="16" r="5"/>
  <circle cx="40" cy="16" r="5"/>
  <circle cx="56" cy="16" r="5"/>
  <circle cx="72" cy="16" r="5"/>
  <!-- Speaker grill area -->
  <rect fill="#1a1a1a" x="6" y="28" width="84" height="62" rx="2"/>
  <!-- Speaker cone -->
  <circle cx="48" cy="60" r="26"/>
  <circle fill="#1a1a1a" cx="48" cy="60" r="16"/>
  <circle cx="48" cy="60" r="8"/>
  <circle fill="#1a1a1a" cx="48" cy="60" r="4"/>
</svg>
