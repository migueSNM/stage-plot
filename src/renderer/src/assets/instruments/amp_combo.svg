<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" fill="white">
  <!-- Combo amp: rectangle, control strip on top, speaker circle cutout (reference style) -->
  <!-- Full cabinet -->
  <rect x="4" y="4" width="88" height="88" rx="4"/>
  <!-- Grill area (bottom 70%) with speaker cutout using evenodd -->
  <path fill-rule="evenodd" d="
    M 6 28 L 90 28 L 90 90 L 6 90 Z
    M 48 62 m -26 0 a 26 26 0 1 0 52 0 a 26 26 0 1 0 -52 0Z
  "/>
  <!-- Control strip knobs (top panel, shown as circles cutouts) -->
  <path fill-rule="evenodd" d="
    M 4 4 L 92 4 L 92 28 L 4 28 Z
    M 22 16 a 6 6 0 1 0 0.01 0Z
    M 40 16 a 6 6 0 1 0 0.01 0Z
    M 58 16 a 6 6 0 1 0 0.01 0Z
    M 76 16 a 6 6 0 1 0 0.01 0Z
  "/>
</svg>
