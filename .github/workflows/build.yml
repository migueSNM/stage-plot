name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest  # Apple Silicon (arm64); Rosetta 2 handles x86_64 slice
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Rosetta 2 is needed for electron-builder to rebuild better-sqlite3 for x86_64
      # when producing the universal (arm64 + x86_64) DMG
      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (universal)
        run: npm run package:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows (x64)
        run: npm run package:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*.exe

  publish:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && secrets.RELEASES_PAT != ''
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist/

      - name: Create release on stage-plot-releases
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" dist/*.dmg dist/*.exe \
            --repo miguesnm/stage-plot-releases \
            --title "Stage Plot $TAG" \
            --notes "See [source repo](https://github.com/${{ github.repository }}) for full changelog."
