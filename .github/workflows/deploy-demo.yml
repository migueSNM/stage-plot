name: Deploy Demo

on:
  # Automatically re-deploy the demo whenever a new desktop release ships
  push:
    tags:
      - 'v*'

  # Also allows manual runs — useful for rotating the token or expiry date
  # without creating a new release.
  workflow_dispatch:
    inputs:
      expires_at:
        description: 'Override demo expiry date (ISO 8601, e.g. 2026-06-15). Leave empty to use the stored variable.'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Skip postinstall (electron-rebuild) — not needed for a browser-only build
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build web demo
        run: npm run build:web
        env:
          VITE_APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || vars.DEMO_APP_VERSION || '0.0.0' }}
          VITE_DEMO_TOKEN: ${{ vars.DEMO_TOKEN }}
          # Use the workflow_dispatch override if provided, otherwise fall back to the stored variable
          VITE_DEMO_EXPIRES_AT: ${{ inputs.expires_at != '' && inputs.expires_at || vars.DEMO_EXPIRES_AT }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
